# ============================================================
# Smart Coaching — Spring Boot Application Properties
# ============================================================

# ----- Server -----
server.port=8080

# ----- Database Configuration (Environment Variables for Hosting) -----
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/smartcoaching;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ----- H2 Console (access at /h2-console) -----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- JWT -----
# TODO: Replace with a long random secret (256-bit minimum)
jwt.secret=SmartCoachingDemoSecretKey2024PleaseChangeThisToSomethingSecure
jwt.expiration-ms=86400000

# ----- CORS (allow frontend dev) -----
spring.web.cors.allowed-origins=*

# ----- Logging -----
logging.level.com.smartcoaching=INFO
