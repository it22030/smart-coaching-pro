# ============================================================
# Smart Coaching — FIXED CONFIG (Clever Cloud Safe Version)
# ============================================================

# ----- Server -----
server.port=8080

# ----- Local H2 Database (Super Fast) -----
spring.datasource.url=jdbc:h2:mem:smartcoachingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----- Open-in-View -----
spring.jpa.open-in-view=true

# ----- CORS -----
spring.web.cors.allowed-origins=*

# ----- Logging -----
logging.level.com.smartcoaching=DEBUG